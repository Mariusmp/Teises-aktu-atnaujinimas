<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teisės Aktų Atnaujinimas</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 900px;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .controls {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .progress-container {
            width: 100%;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
        }
        .progress-bar {
            width: 0%;
            height: 20px;
            background-color: #2ecc71;
            border-radius: 4px;
            text-align: center;
            line-height: 20px;
            color: white;
            font-size: 12px;
            transition: width 0.3s;
        }

        .log-box {
            width: 100%;
            height: 200px;
            background-color: #1e1e1e;
            color: #d4d4d4;
            font-family: monospace;
            padding: 10px;
            overflow-y: auto;
            border-radius: 4px;
            margin-bottom: 20px;
            display: none;
            box-sizing: border-box;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .status-updated { color: #f39c12; font-weight: bold; }
        .status-new { color: #2ecc71; font-weight: bold; }
        .status-error { color: #e74c3c; font-weight: bold; }
        .status-none { color: #7f8c8d; }

        /* Modal styles for Diff */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: #fefefe;
            margin: 5% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-height: 80vh;
            overflow-y: auto;
            border-radius: 8px;
        }
        .close {
            color: #aaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }
        .close:hover {
            color: black;
        }
        del { background-color: #ffe6e6; text-decoration: line-through; }
        ins { background-color: #e6ffe6; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Teisės Aktų Atnaujinimas</h1>

    <div class="controls">
        <button id="updateBtn" onclick="startUpdate()">Atnaujinti / Tikrinti pakeitimus</button>
    </div>

    <div class="progress-container" id="progressContainer">
        <div class="progress-bar" id="progressBar">0%</div>
    </div>

    <div class="log-box" id="logBox"></div>

    <table id="resultsTable">
        <thead>
            <tr>
                <th>Failo Pavadinimas</th>
                <th>Statusas</th>
                <th>Nuoroda į Drive</th>
                <th>Pakeitimai</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
        </tbody>
    </table>
</div>

<!-- Modal for Diff -->
<div id="diffModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2>Teksto Pakeitimai</h2>
        <div id="diffContent"></div>
    </div>
</div>

<script>
    let ws;

    function startUpdate() {
        const btn = document.getElementById('updateBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const logBox = document.getElementById('logBox');
        const resultsTable = document.getElementById('resultsTable');
        const resultsBody = document.getElementById('resultsBody');

        // Reset UI
        btn.disabled = true;
        btn.innerText = "Vykdoma...";
        progressContainer.style.display = 'block';
        progressBar.style.width = '0%';
        progressBar.innerText = '0%';
        logBox.style.display = 'block';
        logBox.innerHTML = '';
        resultsTable.style.display = 'none';
        resultsBody.innerHTML = '';

        // Connect to WebSocket
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const token = "{{ token }}";
        ws = new WebSocket(`${protocol}//${window.location.host}/ws?token=${token}`);

        ws.onmessage = function(event) {
            const data = JSON.parse(event.data);

            if (data.type === 'log') {
                logBox.innerHTML += `<div>${data.message}</div>`;
                logBox.scrollTop = logBox.scrollHeight;
            }
            else if (data.type === 'progress') {
                const percent = data.total > 0 ? Math.round((data.current / data.total) * 100) : 0;
                progressBar.style.width = `${percent}%`;
                progressBar.innerText = `${percent}% (${data.current}/${data.total})`;
            }
            else if (data.type === 'final_results') {
                renderResults(data.data);
            }
            else if (data.type === 'done') {
                btn.disabled = false;
                btn.innerText = "Atnaujinti / Tikrinti pakeitimus";
                logBox.innerHTML += `<div><b>Procesas baigtas!</b></div>`;
                logBox.scrollTop = logBox.scrollHeight;
                ws.close();
            }
        };

        ws.onerror = function(error) {
            console.error("WebSocket error", error);
            logBox.innerHTML += `<div style="color: red;">Klaida prisijungiant prie serverio.</div>`;
            btn.disabled = false;
            btn.innerText = "Atnaujinti / Tikrinti pakeitimus";
        };
    }

    function renderResults(results) {
        const resultsTable = document.getElementById('resultsTable');
        const resultsBody = document.getElementById('resultsBody');

        if (results.length > 0) {
            resultsTable.style.display = 'table';

            results.forEach((res, index) => {
                const tr = document.createElement('tr');

                // Name
                const tdName = document.createElement('td');
                tdName.innerText = res.file_name;
                tr.appendChild(tdName);

                // Status
                const tdStatus = document.createElement('td');
                if (res.status === 'updated') {
                    tdStatus.innerHTML = '<span class="status-updated">Atnaujinta</span>';
                } else if (res.status === 'new') {
                    tdStatus.innerHTML = '<span class="status-new">Naujas</span>';
                } else if (res.status === 'error') {
                    tdStatus.innerHTML = `<span class="status-error">Klaida</span> (${res.message || ''})`;
                } else {
                    tdStatus.innerHTML = '<span class="status-none">Nepakito</span>';
                }
                tr.appendChild(tdStatus);

                // Link
                const tdLink = document.createElement('td');
                if (res.link) {
                    tdLink.innerHTML = `<a href="${res.link}" target="_blank">Atidaryti PDF</a>`;
                } else {
                    tdLink.innerText = '-';
                }
                tr.appendChild(tdLink);

                // Diff
                const tdDiff = document.createElement('td');
                if (res.diff && res.diff.has_changes) {
                    const btn = document.createElement('button');
                    btn.innerText = "Rodyti pakeitimus";
                    btn.onclick = () => showDiff(res.diff.html_diff);
                    tdDiff.appendChild(btn);
                } else {
                    tdDiff.innerText = "Nėra";
                }
                tr.appendChild(tdDiff);

                resultsBody.appendChild(tr);
            });
        }
    }

    function showDiff(htmlDiff) {
        document.getElementById('diffContent').innerHTML = htmlDiff;
        document.getElementById('diffModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('diffModal').style.display = 'none';
    }

    // Close modal if clicked outside of it
    window.onclick = function(event) {
        const modal = document.getElementById('diffModal');
        if (event.target == modal) {
            modal.style.display = "none";
        }
    }
</script>
</body>
</html>
